<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sub.CN</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-deep: #16213e;
            --bg-card: #1a2744;
            --border: #0f3460;
            --accent: #16c79a;
            --accent-hover: #12a37d;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --warning: #ffc107;
            --text: #e0e0e0;
            --text-dim: #888;
            --color-blue: #3498db;
            --color-purple: #9b59b6;
            --color-green: #27ae60;
            --color-gray: #adb5bd;
            --color-gray-dark: #555;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
            --focus-ring: 0 0 0 2px rgba(22,199,154,0.4);

            /* Spacing scale (4px base) */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --space-xl: 20px;
            --space-2xl: 24px;

            /* Typography scale */
            --text-xs: 0.72rem;
            --text-sm: 0.8rem;
            --text-base: 0.9rem;
            --text-md: 0.95rem;
            --text-lg: 1.1rem;
            --text-xl: 1.4rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :focus-visible { outline: none; box-shadow: var(--focus-ring); }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 220px;
            background: var(--bg-deep);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            transition: transform 0.3s;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h1 {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
            flex-shrink: 0;
        }
        .sidebar-header p {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; color: var(--text-dim);
            text-decoration: none; cursor: pointer; border: none;
            background: none; width: 100%; text-align: left;
            font-size: 0.95rem; transition: all 0.2s; border-left: 3px solid transparent;
        }
        .nav-item:hover { color: var(--text); background: rgba(22,199,154,0.06); }
        .nav-item.active { color: var(--accent); background: rgba(22,199,154,0.1); border-left-color: var(--accent); }
        .nav-item:focus-visible { box-shadow: var(--focus-ring) inset; }
        .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
        .main-wrap {
            flex: 1; margin-left: 220px; display: flex; flex-direction: column; min-height: 100vh;
        }
        .top-bar {
            display: none; align-items: center; padding: 12px 16px;
            background: var(--bg-deep); border-bottom: 1px solid var(--border);
        }
        .hamburger {
            background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer;
            padding: 4px 8px; margin-right: 12px;
        }
        .top-bar-title { font-size: 1rem; color: var(--accent); font-weight: 600; }
        .overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 99;
        }
        #page-content { flex: 1; padding: 24px; max-width: 1400px; width: 100%; }
        .page-title {
            font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: var(--text);
        }
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
        }
        .card-title {
            font-size: 1rem; font-weight: 600; margin-bottom: 16px;
            color: var(--accent); border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .form-row {
            display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap;
        }
        .form-label {
            width: 160px; flex-shrink: 0; font-size: 0.9rem; color: var(--text-dim);
            display: inline-flex; align-items: center; gap: 4px;
        }
        .info-tip {
            position: relative; display: inline-flex; align-items: center; cursor: help;
            font-style: normal; font-size: 0.8rem; color: var(--text-dim); opacity: 0.6;
        }
        .info-tip:hover { opacity: 1; }
        .info-tip::after {
            content: attr(data-tip);
            position: absolute; left: 50%; bottom: 130%; transform: translateX(-50%);
            background: var(--bg-card); color: var(--text); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 6px 10px; font-size: 0.8rem;
            white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s;
            box-shadow: var(--shadow-sm); z-index: 100;
        }
        .info-tip:hover::after { opacity: 1; }
        .form-input, .form-select, .form-textarea {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 8px 12px; font-size: 0.9rem;
            flex: 1; min-width: 200px;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none; border-color: var(--accent);
        }
        .form-textarea { min-height: 80px; resize: vertical; font-family: monospace; font-size: 0.9rem; }
        .form-checkbox { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
        .btn {
            padding: 8px 16px; border: none; border-radius: var(--radius-sm);
            font-size: 0.9rem; cursor: pointer; transition: all 0.2s; white-space: nowrap;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--accent); color: var(--bg); font-weight: 600; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-loading { pointer-events: none; opacity: 0.7; position: relative; }
        .btn-loading .spinner { width: 14px; height: 14px; border-width: 2px; }
        .btn-danger { background: var(--danger); color: var(--bg); }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn:focus-visible { box-shadow: var(--focus-ring); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-outline {
            background: transparent; border: 1px solid var(--border); color: var(--text);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid var(--text-dim); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            z-index: 9999;
            display: flex; flex-direction: column-reverse; gap: 8px; pointer-events: none;
        }
        .toast {
            padding: 12px 20px; border-radius: var(--radius-sm);
            font-size: 0.9rem; animation: fadeIn 0.3s; pointer-events: auto;
            max-width: 400px; word-break: break-word;
            display: flex; align-items: center; gap: 8px;
        }
        .toast-dismiss {
            background: none; border: none; color: inherit; opacity: 0.5;
            cursor: pointer; padding: 0 4px; font-size: 1.1rem; line-height: 1;
        }
        .toast-dismiss:hover { opacity: 1; }
        .toast.removing { animation: fadeOut 0.3s forwards; }
        .toast.success { background: rgba(22,199,154,0.15); border: 1px solid var(--accent); color: var(--accent); }
        .toast.error { background: rgba(231,76,60,0.15); border: 1px solid var(--danger); color: var(--danger); }
        .toast.info { background: rgba(255,193,7,0.15); border: 1px solid var(--warning); color: var(--warning); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(10px); } }
        .movie-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px;
        }
        .movie-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column; height: 100%;
        }
        .movie-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .movie-poster {
            background: var(--bg-deep);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: var(--border);
            aspect-ratio: 2/3; overflow: hidden; position: relative;
        }
        .movie-poster img {
            width: 100%; height: 100%; display: block;
            object-fit: cover;
        }
        .movie-info { padding: 12px; flex: 1; display: flex; flex-direction: column; }
        .movie-title {
            font-size: 0.95rem; font-weight: 600; margin-bottom: 4px;
            display: flex; align-items: center; gap: 6px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .movie-title-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .movie-meta { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .movie-actions { display: flex; gap: 6px; margin-top: auto; }
        .series-list { display: flex; flex-direction: column; gap: 8px; }
        .series-item {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); overflow: hidden;
        }
        .series-header {
            display: flex; align-items: center; gap: 12px; padding: 14px 16px;
            cursor: pointer; transition: background 0.15s;
        }
        .series-header:hover { background: rgba(22,199,154,0.05); }
        .series-poster { width: 40px; height: 60px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .series-title { flex: 1; font-weight: 600; font-size: 0.95rem; }
        .series-meta { font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .season-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; background: rgba(22,199,154,0.15); color: var(--accent); }
        .series-expand { font-size: 0.8rem; color: var(--text-dim); transition: transform 0.2s; }
        .series-expand.open { transform: rotate(90deg); }
        .episode-list { display: none; border-top: 1px solid var(--border); }
        .episode-list.open { display: block; }
        .episode-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px 12px 28px; border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .episode-item:last-child { border-bottom: none; }
        .episode-item:hover { background: rgba(22,199,154,0.05); }
        .episode-num { font-size: 0.9rem; color: var(--accent); font-weight: 600; min-width: 50px; }
        .episode-title-text { flex: 1; font-size: 0.9rem; word-break: break-word; }
        .episode-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .lang-badge {
            display: inline-flex; align-items: center;
            padding: 1px 6px; border-radius: 3px;
            font-size: 0.65rem; font-weight: 600;
            border: 1px solid;
            flex-shrink: 0;
        }
        .lang-badge.zh { background: rgba(22,199,154,0.06); color: var(--accent); border-color: rgba(22,199,154,0.35); }
        .lang-badge.en { background: rgba(52,152,219,0.06); color: var(--color-blue); border-color: rgba(52,152,219,0.35); }
        .lang-badge.zhen { background: rgba(155,89,182,0.06); color: var(--color-purple); border-color: rgba(155,89,182,0.35); }
        .lang-badge.none { background: rgba(231,76,60,0.06); color: var(--danger); border-color: rgba(231,76,60,0.35); }
        .lang-badge.missing { background: rgba(108,117,125,0.06); color: var(--color-gray); border-color: rgba(108,117,125,0.35); }
        .queue-section { margin-bottom: 24px; }
        .queue-section-title {
            font-size: 1.1rem; font-weight: 600; margin-bottom: 12px;
            padding-bottom: 8px; border-bottom: 1px solid var(--border);
        }
        .queue-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
        }
        .queue-item:last-child { border-bottom: none; }
        .queue-path { flex: 1; font-size: 0.9rem; word-break: break-all; }
        .queue-status { font-size: 0.9rem; }
        .queue-status.active { color: var(--accent); }
        .queue-status.done { color: var(--color-green); }
        .queue-status.error { color: var(--danger); }
        .queue-status.skipped { color: var(--color-gray); }

        /* Progress bar */
        .progress-bar {
            width: 100%; height: 6px; background: var(--bg); border-radius: 3px;
            overflow: hidden; margin-top: 4px;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 3px; transition: width 0.4s ease;
            background: var(--accent);
        }
        .progress-bar-fill.error { background: var(--danger); }
        .progress-bar-text { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
        .breadcrumb {
            display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
            padding: 12px; background: var(--bg-deep); border-radius: var(--radius-sm);
            font-size: 0.9rem; flex-wrap: wrap;
        }
        .breadcrumb a { color: var(--accent); text-decoration: none; cursor: pointer; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb .sep { color: var(--color-gray-dark); }
        .entry-list { list-style: none; }
        .entry-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-bottom: 1px solid var(--border); transition: background 0.15s;
        }
        .entry-item:last-child { border-bottom: none; }
        .entry-item:hover { background: rgba(22,199,154,0.04); }
        .entry-icon { font-size: 1.4rem; width: 32px; text-align: center; flex-shrink: 0; }
        .entry-name { flex: 1; word-break: break-all; font-size: 0.95rem; }
        .entry-meta { color: var(--text-dim); font-size: 0.8rem; white-space: nowrap; margin-left: 8px; }
        .entry-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .subtitle-indicator { color: var(--accent); font-size: 1rem; margin-left: 4px; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .log-table th, .log-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        .log-table th { color: var(--text-dim); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .log-table tbody tr:hover { background: rgba(22,199,154,0.04); }
        .log-status {
            display: inline-block; padding: 4px 12px; border-radius: 12px;
            font-size: 0.8rem; font-weight: 600;
        }
        .log-status.success { background: rgba(22,199,154,0.2); color: var(--accent); }
        .log-status.error { background: rgba(231,76,60,0.2); color: var(--danger); }
        .log-status.failed { background: rgba(255,193,7,0.2); color: var(--warning); }
        .log-status.skipped { background: rgba(108,117,125,0.2); color: var(--color-gray); }
        .log-actions { margin-bottom: 16px; text-align: right; }
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-dim); }
        .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
        .sub-picker {
            position: absolute; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 8px; min-width: 240px;
            box-shadow: var(--shadow-lg); z-index: 200;
        }
        .sub-picker-item {
            display: flex; align-items: center; gap: 8px; padding: 8px 12px;
            border-radius: var(--radius-sm); transition: background 0.15s;
        }
        .sub-picker-item:hover { background: rgba(22,199,154,0.08); }
        .sub-picker-name { flex: 1; font-size: 0.9rem; word-break: break-all; }
        .sub-picker-badge { font-size: 0.72rem; color: var(--text-dim); }
        .sub-picker-exists { font-size: 0.8rem; color: var(--accent); }
        .test-btn { min-width: auto; }
        .section-gap { margin-top: 24px; }

        /* Toolbar */
        .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .toolbar .btn { white-space: nowrap; }
        .toolbar select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 0.9rem; }
        .toolbar label { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; color: var(--text-dim); cursor: pointer; }
        .toolbar-stats { font-size: 0.8rem; color: var(--text-dim); margin-left: auto; }

        /* Stats summary → Filter tabs */
        .filter-tabs {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .filter-tab {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            flex: 1; padding: 8px 12px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--bg-card);
            color: var(--text-dim); font-size: 0.9rem; cursor: pointer;
            transition: all 0.2s; font-weight: 500;
        }
        .filter-tab:hover { border-color: var(--accent); color: var(--text); }
        .filter-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(22,199,154,0.08); }
        .filter-tab.active.zh { border-color: var(--accent); color: var(--accent); background: rgba(22,199,154,0.08); }
        .filter-tab.active.en { border-color: var(--color-blue); color: var(--color-blue); background: rgba(52,152,219,0.08); }
        .filter-tab.active.missing { border-color: var(--danger); color: var(--danger); background: rgba(231,76,60,0.08); }
        .filter-tab:disabled { opacity: 0.35; cursor: not-allowed; }
        .filter-tab:disabled:hover { border-color: var(--border); color: var(--text-dim); }
        .filter-tab-count {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 24px; height: 22px; border-radius: 11px;
            font-size: 0.8rem; font-weight: 700; padding: 0 6px;
            background: rgba(255,255,255,0.06); color: var(--text-dim);
        }
        .filter-tab.active .filter-tab-count { background: rgba(22,199,154,0.15); color: var(--accent); }
        .filter-tab.active.en .filter-tab-count { background: rgba(52,152,219,0.15); color: var(--color-blue); }
        .filter-tab.active.missing .filter-tab-count { background: rgba(231,76,60,0.15); color: var(--danger); }
        .filter-tab:disabled .filter-tab-count { opacity: 0.5; }

        /* Subtitle status badges */
.lang-badge.none { color: var(--danger); }
.lang-badge.missing { color: var(--color-gray); }

        /* Season tabs */
        .season-tabs { display: flex; gap: 4px; padding: 8px 16px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .season-tab { padding: 6px 14px; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 600; cursor: pointer; background: var(--bg); border: 1px solid var(--border); color: var(--text-dim); white-space: nowrap; transition: all 0.15s; }
        .season-tab:hover { border-color: var(--accent); color: var(--text); }
        .season-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .season-tab .tab-count { font-weight: 400; opacity: 0.7; margin-left: 4px; font-size: 0.72rem; }

        /* Episode dimmed */
        .episode-item.dimmed { opacity: 0.5; }
        .episode-item.dimmed .btn { pointer-events: none; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .overlay.open { display: block; }
            .main-wrap { margin-left: 0; }
            .top-bar { display: flex; }
            #page-content { padding: 16px; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .movie-info { padding: 8px; }
            .form-row { flex-direction: column; align-items: flex-start; }
            .form-label { width: auto; min-width: 0; }
            .form-input, .form-select, .form-textarea { width: 100%; min-width: 0; }
            .episode-item { flex-wrap: wrap; }
            .episode-actions { width: 100%; margin-top: 6px; }
            .entry-item { flex-wrap: wrap; }
            .entry-actions { width: 100%; margin-top: 6px; justify-content: flex-end; }
            .log-table { font-size: 0.8rem; display: block; overflow-x: auto; }
            .log-table th, .log-table td { padding: 8px; }
            .log-table .col-duration { display: none; }
            .filter-tabs { gap: 6px; flex-wrap: wrap; }
            .filter-tab { padding: 6px 8px; font-size: 0.8rem; }
            .filter-tab-count { min-width: 20px; height: 18px; font-size: 0.72rem; }
            .toolbar { gap: 8px; }
            .toolbar select { font-size: 0.8rem; padding: 4px 8px; }
            .series-meta { flex-wrap: wrap; }
            .page-title { font-size: 1.2rem; }
            .toast { max-width: 280px; font-size: 0.8rem; padding: 10px 14px; }
            .toast-container { bottom: 8px; left: 8px; right: 8px; transform: none; }
            .queue-item { flex-wrap: wrap; gap: 8px; }
            .queue-path { min-width: 0; }
            .queue-card-list { display: flex; flex-direction: column; gap: 12px; }
            .queue-card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 12px;
                overflow: hidden;
            }
            .queue-card-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                margin-bottom: 8px;
            }
            .queue-card-filename {
                flex: 1;
                font-size: 0.9rem;
                font-weight: 500;
                word-break: break-all;
                min-width: 0;
                color: var(--text);
            }
            .queue-card-meta {
                display: flex;
                flex-direction: column;
                gap: 4px;
                margin-bottom: 8px;
            }
            .queue-card-meta-row {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 0.85rem;
            }
            .queue-card-label {
                color: var(--text-dim);
                font-size: 0.8rem;
                min-width: 50px;
                flex-shrink: 0;
            }
            .queue-card-value {
                color: var(--text);
                flex: 1;
                word-break: break-word;
            }
            .queue-card-detail-toggle {
                font-size: 0.85rem;
                color: var(--text-dim);
                cursor: pointer;
                padding: 6px 0;
                margin-top: 4px;
                border-top: 1px solid var(--border);
                transition: color 0.2s;
                user-select: none;
            }
            .queue-card-detail-toggle:hover {
                color: var(--accent);
            }
            .queue-card-detail {
                margin-top: 8px;
                padding-top: 8px;
            }
            .queue-card-detail table {
                width: 100%;
                font-size: 0.85rem;
                border-collapse: collapse;
            }
            .queue-card-detail th,
            .queue-card-detail td {
                padding: 4px 6px;
                text-align: left;
                border-bottom: 1px solid var(--border);
            }
            .queue-card-detail th {
                color: var(--text-dim);
                font-weight: 500;
            }
            .queue-card-detail tr:last-child td {
                border-bottom: none;
            }
            .queue-card-progress {
                margin-top: 6px;
            }
            .queue-card-progress .progress-bar {
                margin-top: 4px;
            }
            .queue-card .log-status { font-size: 0.8rem; padding: 2px 8px; }
            .queue-card .spinner { width: 14px; height: 14px; border-width: 2px; }
            .card { padding: 12px; margin-bottom: 12px; }
            .card-title { font-size: 0.95rem; margin-bottom: 12px; padding-bottom: 6px; }
            .form-label { width: 100%; font-weight: 600; font-size: 0.95rem; color: var(--text); margin-bottom: 2px; }
            .form-label:empty { display: none; }
            .form-row { gap: 8px; margin-bottom: 16px; }
            .form-textarea { min-height: 100px; }
            .pm-row { flex-direction: column !important; align-items: stretch !important; gap: 4px !important; margin-bottom: 8px !important; }
            .pm-row .form-input { width: 100% !important; }
            .pm-row > span:nth-child(2) { text-align: center; padding: 2px 0; color: var(--text-dim); }
            .pm-row > span:last-child { align-self: flex-end; padding: 4px 0; }
            #prov-checkboxes { gap: 8px !important; }
            #prov-checkboxes label { font-size: 0.85rem; }
            .info-tip { display: inline-flex; align-items: center; cursor: pointer; }
            .info-tip::after { content: attr(data-tip); display: inline; position: static; transform: none; left: auto; bottom: auto; opacity: 1; white-space: normal; font-size: 0.75rem; color: var(--text-dim); background: none; border: none; padding: 0 0 0 4px; box-shadow: none; margin: 0; pointer-events: auto; max-width: 100%; word-break: break-word; }
            .info-tip.active { color: var(--accent); }
            .webhook-urls code { word-break: break-all; display: inline-block; max-width: 100%; line-height: 1.6; }
            .btn-save { width: 100%; justify-content: center; }
            .form-hint { word-break: break-word; line-height: 1.6; }
        }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1000; justify-content:center; align-items:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:24px 28px 20px; max-width:360px; width:90%; }
        .modal-msg { font-size:0.95rem; margin-bottom:20px; line-height:1.5; }
        .modal-actions { display:flex; justify-content:flex-end; gap:10px; }
        .modal-btn { padding:6px 18px; border-radius:var(--radius-sm); border:none; cursor:pointer; font-size:0.9rem; }
        .modal-cancel { background:transparent; color:var(--text-dim); border:1px solid var(--border); }
        .modal-cancel:hover { color:var(--text); border-color:var(--text-dim); }
        .modal-ok { background:var(--accent); color:var(--bg); }
        .modal-ok:hover { background:var(--accent-hover); }

        /* Search results modal */
        .search-modal-box { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); max-width:880px; width:94%; overflow:hidden; }
        .search-modal-header { display:flex; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); gap:12px; }
        .search-modal-header h3 { font-size:1.05rem; margin:0; white-space:nowrap; }
        .search-modal-video { flex:1; font-size:0.82rem; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
        .search-modal-close { background:none; border:none; color:var(--text-dim); font-size:1.3rem; cursor:pointer; padding:2px 6px; line-height:1; }
        .search-modal-close:hover { color:var(--text); }
        .search-modal-info { padding:8px 20px; font-size:0.82rem; color:var(--text-dim); border-bottom:1px solid var(--border); background:var(--bg-deep); }
        .search-modal-body { max-height:62vh; overflow-y:auto; }
        .search-results-table { width:100%; border-collapse:collapse; font-size:0.88rem; }
        .search-results-table th { padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); color:var(--text-dim); font-weight:600; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.5px; background:var(--bg-deep); position:sticky; top:0; z-index:1; }
        .search-results-table td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
        .search-results-table tbody tr:hover { background:rgba(22,199,154,0.04); }
        .search-result-title { max-width:320px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .search-result-provider { white-space:nowrap; font-size:0.82rem; }
        .search-dl-btn { min-width:50px; }
        .search-no-results { text-align:center; padding:48px 24px; color:var(--text-dim); }
        .search-no-results-icon { font-size:2.5rem; margin-bottom:8px; }
    </style>
</head>
<body>
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <div class="modal-msg" id="confirmMsg"></div>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="confirmNo">取消</button>
                <button class="modal-btn modal-ok" id="confirmYes">确认</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="searchModal" onclick="if(event.target===this)closeSearchModal()">
        <div class="search-modal-box">
            <div class="search-modal-header">
                <h3>📝 字幕搜索</h3>
                <span class="search-modal-video" id="searchVideoName"></span>
                <button class="search-modal-close" onclick="closeSearchModal()">✕</button>
            </div>
            <div class="search-modal-info" id="searchInfo"></div>
            <div class="search-modal-body" id="searchResults"></div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1><img src="/favicon-dark.ico" class="sidebar-logo" alt="logo"> sub.CN</h1>
            <p>Subtitle Downloader</p>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav">
            <button class="nav-item active" data-page="movies" onclick="navigateTo('movies')">
                <span class="nav-icon">🎬</span> 电影
            </button>
            <button class="nav-item" data-page="series" onclick="navigateTo('series')">
                <span class="nav-icon">📺</span> 电视剧
            </button>
            <button class="nav-item" data-page="queue" onclick="navigateTo('queue')">
                <span class="nav-icon">⬇️</span> 下载队列
            </button>
            <button class="nav-item" data-page="browse" onclick="navigateTo('browse')">
                <span class="nav-icon">📁</span> 目录浏览
            </button>
            <button class="nav-item" data-page="logs" onclick="navigateTo('logs')">
                <span class="nav-icon">📋</span> 运行日志
            </button>
            <button class="nav-item" data-page="translate-config" onclick="navigateTo('translate-config')">
                <span class="nav-icon">🌐</span> 翻译设置
            </button>
            <button class="nav-item" data-page="config" onclick="navigateTo('config')">
                <span class="nav-icon">⚙️</span> 配置中心
            </button>
        </nav>
    </div>
    <div class="main-wrap">
        <div class="top-bar">
            <button class="hamburger" onclick="toggleSidebar()">☰</button>
            <span class="top-bar-title" id="top-bar-title">sub.CN</span>
        </div>
        <div id="page-content">
            <div class="empty-state">
                <div class="empty-state-icon"><span class="spinner" style="width:32px;height:32px;border-width:3px"></span></div>
                <p>加载中...</p>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toast-container"></div>

    <script>
    var _config = {};
    var _currentPage = 'movies';
    var _browsePath = '';
    var _movieSubtitleMap = {};
    var _subtitle_status_cache = {};
    var _searchBtnRef = null;
    var _seriesSeasonTab = {};
    var _seriesDataCache = [];

    var PAGE_TITLES = {
        'movies': '电影',
        'series': '电视剧',
        'queue': '下载队列',
        'browse': '目录浏览',
        'logs': '运行日志',
        'translate-config': '翻译设置',
        'config': '配置中心'
    };

    fetch('/api/settings').then(function(r) { return r.json(); }).then(function(s) {
        _config = s;
        navigateTo('movies');
    }).catch(function() {
        navigateTo('movies');
    });

    function esc(str) {
        if (typeof str !== 'string') return String(str);
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    function formatBytes(bytes) {
        if (!bytes || bytes === 0) return '0 B';
        var k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        var i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
    function pad2(n) { return n < 10 ? '0' + n : '' + n; }

    /* Unified button loading state */
    function btnLoading(btn, text) {
        btn._origHtml = btn.innerHTML;
        btn.disabled = true;
        btn.classList.add('btn-loading');
        btn.innerHTML = '<span class="spinner" style="margin-right:4px"></span>' + (text || '处理中...');
    }
    function btnReset(btn) {
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        btn.innerHTML = btn._origHtml || btn.textContent;
        delete btn._origHtml;
    }

    function toast(msg, type) {
        type = type || 'info';
        var container = document.getElementById('toast-container');
        var el = document.createElement('div');
        el.className = 'toast ' + type;
        var text = document.createElement('span');
        text.textContent = msg;
        el.appendChild(text);
        var dismiss = document.createElement('button');
        dismiss.className = 'toast-dismiss';
        dismiss.textContent = '×';
        dismiss.onclick = function() { removeToast(el); };
        el.appendChild(dismiss);
        container.appendChild(el);
        setTimeout(function() { removeToast(el); }, 4000);
    }
    function removeToast(el) {
        if (!el.parentElement) return;
        el.classList.add('removing');
        setTimeout(function() { el.remove(); }, 300);
    }

    function toggleSidebar() {
        var sb = document.getElementById('sidebar');
        var ov = document.getElementById('overlay');
        sb.classList.toggle('open');
        ov.classList.toggle('open');
    }

    function navigateTo(page) {
        _currentPage = page;
        clearInterval(_queuePollTimer);
        document.querySelectorAll('.nav-item').forEach(function(el) {
            el.classList.toggle('active', el.dataset.page === page);
        });
        var sb = document.getElementById('sidebar');
        var ov = document.getElementById('overlay');
        sb.classList.remove('open');
        ov.classList.remove('open');
        document.getElementById('top-bar-title').textContent = PAGE_TITLES[page] || '';

        switch (page) {
            case 'movies': showMovies(); break;
            case 'series': showSeries(); break;
            case 'queue': showQueue(); break;
            case 'browse': showBrowse(); break;
            case 'logs': showLogs(); break;
            case 'translate-config': showTranslateConfig(); break;
            case 'config': showConfig(); break;
            default: showMovies();
        }
    }

    function setLoading(title) {
        document.getElementById('page-content').innerHTML =
            '<div class="page-title">' + esc(title) + '</div>' +
            '<div class="empty-state"><span class="spinner" style="width:32px;height:32px;border-width:3px"></span><p style="margin-top:12px">加载中...</p></div>';
    }

    function enqueueFromBtn(btn) {
        if (btn.disabled) return;
        btnLoading(btn, '下载中');
        var path = btn.dataset.path;
        var movieId = btn.dataset.movieId || null;
        var episodeId = btn.dataset.episodeId || null;
        var lang = _config.auto_download_lang || 'zho_chs';
        var maxCount = _config.max_download_count || 1;
        var payload = { video_path: path, lang: lang, max_count: maxCount };
        if (movieId) payload.movie_id = parseInt(movieId);
        if (episodeId) payload.episode_id = parseInt(episodeId);
        fetch('/api/download/top', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.status === 'enqueued' || data.status === 'success' || data.status === 'queued') {
                toast('已加入下载队列: ' + path.split('/').pop(), 'success');
                btn.innerHTML = '已入队';
                btn.disabled = false;
                setTimeout(function() { btnReset(btn); }, 2000);
            } else if (data.status === 'skipped') {
                btnReset(btn);
                showConfirm('已有中文字幕，是否重新查找？', function() {
                    payload.force = true;
                    btnLoading(btn, '下载中');
                    fetch('/api/download/top', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).then(function(r) { return r.json(); }).then(function(d2) {
                        if (d2.status === 'enqueued' || d2.status === 'success' || d2.status === 'queued') {
                            toast('已加入下载队列: ' + path.split('/').pop(), 'success');
                            btn.innerHTML = '已入队';
                        } else {
                            toast('下载失败: ' + (d2.error || '未知错误'), 'error');
                            btn.innerHTML = '失败';
                        }
                    }).catch(function(err) {
                        toast('请求失败: ' + err.message, 'error');
                        btn.innerHTML = '失败';
                    }).finally(function() {
                        btn.disabled = false;
                        setTimeout(function() { btnReset(btn); }, 2000);
                    });
                });
            } else {
                toast('下载失败: ' + (data.error || '未知错误'), 'error');
                btn.innerHTML = '失败';
                btn.disabled = false;
                setTimeout(function() { btnReset(btn); }, 2000);
            }
        }).catch(function(err) {
            toast('请求失败: ' + err.message, 'error');
            btn.innerHTML = '失败';
            btn.disabled = false;
            setTimeout(function() { btnReset(btn); }, 2000);
        });
    }

    function enqueue(path, movieId, episodeId) {
        var lang = _config.auto_download_lang || 'zho_chs';
        var maxCount = _config.max_download_count || 1;
        var payload = { video_path: path, lang: lang, max_count: maxCount };
        if (movieId) payload.movie_id = parseInt(movieId);
        if (episodeId) payload.episode_id = parseInt(episodeId);
        fetch('/api/download/top', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.status === 'enqueued' || data.status === 'success' || data.status === 'queued') {
                toast('已加入下载队列: ' + path.split('/').pop(), 'success');
            } else {
                toast('下载失败: ' + (data.error || '未知错误'), 'error');
            }
        }).catch(function(err) {
            toast('请求失败: ' + err.message, 'error');
        });
    }

    var _searchResultsCache = [];
    var _searchBtnRef = null;

    var _langDisplayMap = {
        'zho_chs': '简中', 'zho_cht': '繁中', 'chi': '中', 'chs': '简中', 'cht': '繁中',
        'eng': 'EN', 'en': 'EN', 'zho_chs+eng': '中英', 'zho_cht+eng': '中英'
    };
    var _providerDisplayMap = {
        'zimuku': '字幕库', 'subhd': 'SubHD', 'assrt': 'ASSRT', 'opensubtitles': 'OpenSubs'
    };

    function _langBadgeHtml(lang) {
        if (!lang) return '<span class="lang-badge missing">?</span>';
        var isZh = lang.indexOf('zho') === 0 || lang === 'chi' || lang === 'chs' || lang === 'cht';
        var isEn = lang === 'eng' || lang === 'en';
        var isBil = lang.indexOf('+eng') > 0;
        var cls = isBil ? 'zhen' : isZh ? 'zh' : isEn ? 'en' : 'missing';
        var text = _langDisplayMap[lang] || lang;
        return '<span class="lang-badge ' + cls + '">' + esc(text) + '</span>';
    }

    function showSubtitleSearch(btn) {
        if (btn.disabled) return;
        _searchBtnRef = btn;
        var path = btn.dataset.path || '';
        if (!path) { toast('未找到视频路径', 'error'); return; }

        var payload = { video_path: path };
        if (btn.dataset.title) payload.title = btn.dataset.title;
        if (btn.dataset.year) payload.year = parseInt(btn.dataset.year) || btn.dataset.year;
        if (btn.dataset.imdbId) payload.imdb_id = btn.dataset.imdbId;
        if (btn.dataset.sceneName) payload.scene_name = btn.dataset.sceneName;
        if (btn.dataset.season) payload.season = parseInt(btn.dataset.season);
        if (btn.dataset.episodeNum) payload.episode = parseInt(btn.dataset.episodeNum);

        var modal = document.getElementById('searchModal');
        var videoName = path.split('/').pop();
        document.getElementById('searchVideoName').textContent = videoName;
        document.getElementById('searchInfo').textContent = '搜索中...';
        document.getElementById('searchResults').innerHTML = '<div style="text-align:center;padding:48px 24px"><span class="spinner" style="width:32px;height:32px;border-width:3px"></span><p style="margin-top:12px;color:var(--text-dim)">正在搜索所有引擎...</p></div>';
        modal.classList.add('show');

        btnLoading(btn, '搜索中');
        console.log('[subtitle-search] payload:', payload);

        var apiUrl = (window.location.origin || '') + '/api/search/video';
        if (!apiUrl || apiUrl.indexOf('null') === 0) {
            apiUrl = '/api/search/video';
        }
        console.log('[subtitle-search] URL:', apiUrl);
        fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) {
            if (!r.ok) {
                return r.text().then(function(txt) {
                    throw new Error('HTTP ' + r.status + ': ' + txt.substring(0, 200));
                });
            }
            return r.json();
        }).then(function(data) {
            btnReset(btn);
            _searchResultsCache = data.results || [];
            var searchId = data.search_id || '';
            var keyword = data.keyword || '';
            var error = data.error || '';

            if (error) {
                document.getElementById('searchInfo').textContent = '搜索出错: ' + error;
                document.getElementById('searchResults').innerHTML = '';
                return;
            }

            document.getElementById('searchInfo').textContent = '关键词: ' + keyword + '  |  共 ' + _searchResultsCache.length + ' 条结果';

            if (!_searchResultsCache.length) {
                document.getElementById('searchResults').innerHTML = '<div class="search-no-results"><div class="search-no-results-icon">🔍</div><p>未找到字幕</p></div>';
                return;
            }

            var movieId = btn.dataset.movieId || '';
            var episodeId = btn.dataset.episodeId || '';
            var html = '<table class="search-results-table"><thead><tr>';
            html += '<th>#</th><th>字幕名</th><th>引擎</th><th>语言</th><th>匹配度</th><th></th>';
            html += '</tr></thead><tbody>';
            _searchResultsCache.forEach(function(r, i) {
                var scorePct = r.score_pct || 0;
                var scoreStyle = '';
                if (scorePct >= 72) scoreStyle = 'color:var(--accent);font-weight:bold;';
                else if (scorePct >= 50) scoreStyle = 'color:var(--warning);font-weight:bold;';
                else if (scorePct > 0) scoreStyle = 'color:var(--danger);font-weight:bold;';

                var provText = _providerDisplayMap[r.provider] || r.provider || '—';
                html += '<tr>';
                html += '<td style="color:var(--text-dim)">' + (i + 1) + '</td>';
                html += '<td class="search-result-title" title="' + esc(r.title || '') + '">' + esc(r.title || '—') + '</td>';
                html += '<td class="search-result-provider">' + esc(provText) + '</td>';
                html += '<td>' + _langBadgeHtml(r.language) + '</td>';
                html += '<td style="' + scoreStyle + '">' + (scorePct > 0 ? scorePct + '%' : '—') + '</td>';
                html += '<td><button class="btn btn-primary btn-sm search-dl-btn" data-index="' + i + '" data-search-id="' + esc(searchId) + '" data-path="' + esc(path) + '" data-movie-id="' + esc(movieId) + '" data-episode-id="' + esc(episodeId) + '" onclick="downloadSelectedResult(this)">下载</button></td>';
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('searchResults').innerHTML = html;
        }).catch(function(err) {
            btnReset(btn);
            console.error('[subtitle-search] error:', err);
            document.getElementById('searchInfo').textContent = '搜索失败: ' + err.message;
            document.getElementById('searchResults').innerHTML = '';
        });
    }

    function downloadSelectedResult(btn) {
        if (btn.disabled) return;
        var index = parseInt(btn.dataset.index);
        var searchId = btn.dataset.searchId || '';
        if (!searchId) { toast('搜索结果已过期，请重新搜索', 'error'); closeSearchModal(); return; }

        btnLoading(btn, '下载中');

        var payload = {
            video_path: btn.dataset.path,
            lang: _config.auto_download_lang || 'zho_chs',
            search_id: searchId,
            result_index: index
        };
        if (btn.dataset.movieId) payload.movie_id = parseInt(btn.dataset.movieId);
        if (btn.dataset.episodeId) payload.episode_id = parseInt(btn.dataset.episodeId);

        var dlUrl = (window.location.origin || '') + '/api/download/selected';
        if (!dlUrl || dlUrl.indexOf('null') === 0) {
            dlUrl = '/api/download/selected';
        }
        fetch(dlUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) {
            if (!r.ok) {
                return r.text().then(function(txt) {
                    throw new Error('HTTP ' + r.status + ': ' + txt.substring(0, 200));
                });
            }
            return r.json();
        }).then(function(data) {
            if (data.status === 'success') {
                btn.innerHTML = '✓';
                btn.disabled = true;

                btn.classList.add('btn-outline');

                if (mid) {
                    var found = _moviesCache.find(function(m) { return m.id == mid; });
                    if (found) found.subtitleStatus = newSt;
                    _movieSubtitleMap[mid] = newSt;
                }

        }).catch(function(err) {

    function renderMovies() {
        var sortBy = _movieSortBy;

        if (subFilter === 'zh') {
            movies = movies.filter(function(m) {
                var s = _movieSubtitleMap[m.id] !== undefined ? _movieSubtitleMap[m.id] : m.subtitleStatus;
                return s === 'zh';
            });
        } else if (subFilter === 'en') {
            movies = movies.filter(function(m) {
                var s = _movieSubtitleMap[m.id] !== undefined ? _movieSubtitleMap[m.id] : m.subtitleStatus;
                return s === 'en';
            });
        } else if (subFilter === 'no_sub') {
            movies = movies.filter(function(m) {
                var s = _movieSubtitleMap[m.id] !== undefined ? _movieSubtitleMap[m.id] : m.subtitleStatus;
                return s !== 'zh' && s !== 'en';
            });
        }
        if (sortBy === 'date_desc') {
            movies.sort(function(a, b) { return new Date(b.dateAdded || 0) - new Date(a.dateAdded || 0); });
        } else if (sortBy === 'date_asc') {
            movies.sort(function(a, b) { return new Date(a.dateAdded || 0) - new Date(b.dateAdded || 0); });
        } else if (sortBy === 'release_desc') {
            movies.sort(function(a, b) { return (b.releaseDate || '').localeCompare(a.releaseDate || ''); });
        } else if (sortBy === 'release_asc') {
            movies.sort(function(a, b) { return (a.releaseDate || '').localeCompare(b.releaseDate || ''); });
        }

        // Count only movies with files
        var withFile = _moviesCache.filter(function(m) { return m.hasFile; });

        html += '<option value="date_asc"' + (sortBy === 'date_asc' ? ' selected' : '') + '>添加时间 ↑</option>';
        html += '<option value="release_desc"' + (sortBy === 'release_desc' ? ' selected' : '') + '>上映日期 ↓</option>';
        html += '<option value="release_asc"' + (sortBy === 'release_asc' ? ' selected' : '') + '>上映日期 ↑</option>';
        html += '</select></div></div>';

        // Filter tabs
        html += '<div class="filter-tabs">';
        html += '<button class="filter-tab' + (subFilter === 'all' ? ' active' : '') + '" onclick="_movieSubFilter=\'all\';renderMovies()"><span class="filter-tab-count">' + totalCount + '</span>所有电影</button>';
        html += '<button class="filter-tab zh' + (subFilter === 'zh' ? ' active' : '') + '" onclick="_movieSubFilter=\'zh\';renderMovies()"' + (zhCount === 0 ? ' disabled' : '') + '><span class="filter-tab-count">' + zhCount + '</span>中文字幕</button>';
        html += '<button class="filter-tab en' + (subFilter === 'en' ? ' active' : '') + '" onclick="_movieSubFilter=\'en\';renderMovies()"' + (enOnlyCount === 0 ? ' disabled' : '') + '><span class="filter-tab-count">' + enOnlyCount + '</span>英文字幕</button>';
        html += '<button class="filter-tab missing' + (subFilter === 'no_sub' ? ' active' : '') + '" onclick="_movieSubFilter=\'no_sub\';renderMovies()"' + (noSubCount === 0 ? ' disabled' : '') + '><span class="filter-tab-count">' + noSubCount + '</span>无字幕</button>';
        html += '</div>';

        } else {
            html += '<div class="movie-grid">';
            movies.forEach(function(m) {
                var fp = m.filePath || m.path || '';

                html += '</div></div></div>';
            });
            html += '</div>';

        document.getElementById('page-content').innerHTML = html;
    }

    function refreshQueue() {
        Promise.all([
            fetch('/api/download/status').then(function(r) { return r.json(); }).catch(function() { return { active: [], completed: [] }; }),
            fetch('/api/translate/status').then(function(r) { return r.json(); }).catch(function() { return { active: [], completed: [] }; })
        ]).then(function(results) {
            var dlData = results[0];
            var trData = results[1];
            var dlActive = dlData.active || [];
            var dlCompleted = (dlData.completed || []).slice(0, 30);
            var trActive = trData.active || [];
            var trCompleted = (trData.completed || []).slice(0, 20);
            var isMobile = window.innerWidth <= 768;

            var html = '<div class="page-title" style="display:flex;align-items:center;justify-content:space-between">下载队列<button class="btn btn-outline btn-sm" onclick="refreshQueue()">⟳ 刷新</button></div>';
            html += '<div class="queue-section"><div class="queue-section-title">字幕下载</div>';
            var allDl = dlActive.concat(dlCompleted);
            if (!allDl.length) {
                html += '<div class="empty-state" style="padding:20px"><p>暂无下载任务</p></div>';
            } else if (isMobile) {
                html += '<div class="queue-card-list">';
                allDl.forEach(function(t, ti) {
                    var fileName = (t.display_path || t.video_path || '').split('/').pop();
                    var prs = t.provider_results || [];
                    var timeStr = '';
                    var ts = t.completed_at || t.started_at || t.created_at || '';
                    if (ts) { timeStr = ts.replace('T', ' ').substring(0, 16); }

    function showBrowse() {
        if (!_browsePath) {
            fetch('/api/config').then(function(r) { return r.json(); }).then(function(cfg) {
                _browsePath = cfg.roots && cfg.roots.length ? cfg.roots[0].path : '';
                loadBrowse();
            });
        } else {
            loadBrowse();
        }
    }

    function loadBrowse() {
        setLoading('目录浏览');
        fetch('/api/browse/' + encodeURIComponent(_browsePath)).then(function(r) { return r.json(); }).then(function(data) {
            renderBrowse(data);
        }).catch(function(err) {
            document.getElementById('page-content').innerHTML =
                '<div class="page-title">目录浏览</div><div class="empty-state"><div class="empty-state-icon">❌</div><p>' + esc(err.message) + '</p></div>';
        });
    }

    function browseTo(path) {
        _browsePath = path;
        loadBrowse();
    }

    function renderBrowse(data) {
        var html = '<div class="page-title">目录浏览</div>';
        html += '<div class="breadcrumb">';
        var parts = data.path ? data.path.split('/') : [];
        var rootName = parts[0] || '';
        html += '<a onclick="browseTo(\'\')">根目录</a>';
        var acc = '';
        parts.forEach(function(part, idx) {
            if (!part) return;
            acc += (acc ? '/' : '') + part;
            html += '<span class="sep">/</span>';
            if (idx === parts.length - 1) {
                html += '<span>' + esc(part) + '</span>';
            } else {
                html += '<a onclick="browseTo(\'' + esc(acc) + '\')">' + esc(part) + '</a>';
            }
        });
        html += '</div>';
        html += '<ul class="entry-list">';
        if (!data.entries || !data.entries.length) {
            html += '<li class="empty-state" style="padding:24px"><p>空目录</p></li>';
        } else {
            data.entries.forEach(function(entry) {
                if (entry.type === 'directory') {
                    var dirPath = data.path ? data.path + '/' + entry.name : entry.name;
                    html += '<li class="entry-item">';
                    html += '<span class="entry-icon">📁</span>';
                    html += '<span class="entry-name">' + esc(entry.name) + '</span>';
                    html += '<div class="entry-actions">';
                    html += '<button class="btn btn-primary btn-sm" onclick="browseTo(\'' + esc(dirPath) + '\')">打开</button>';
                    html += '</div></li>';
                } else {
                    var hasSub = entry.has_subtitle ? '<span class="subtitle-indicator" title="已有字幕">📝</span>' : '';
                    var size = entry.size ? '<span class="entry-meta">' + formatBytes(entry.size) + '</span>' : '';
                    var videoPath = data.path + '/' + entry.name;
                    var isVideo = entry.extension && ['.mkv','.mp4','.avi','.wmv','.ts','.m2ts','.flv','.webm'].indexOf(entry.extension) >= 0;
                    html += '<li class="entry-item">';
                    html += '<span class="entry-icon">' + (isVideo ? '🎥' : '📝') + '</span>';
                    html += '<span class="entry-name">' + esc(entry.name) + hasSub + size + '</span>';
                    html += '<div class="entry-actions">';
                    if (isVideo) {
                        html += '<button class="btn btn-primary btn-sm" data-path="' + esc(videoPath) + '" onclick="enqueueFromBtn(this)">自动</button>';
                        html += '<button class="btn btn-outline btn-sm" data-path="' + esc(videoPath) + '" onclick="showSubtitleSearch(this)">手动</button>';
                    }
                    html += '</div></li>';
                }
            });
        }
        html += '</ul>';
        document.getElementById('page-content').innerHTML = html;
    }

    function testAiConnection(btn) {
        var resultEl = document.getElementById('tc-test-result');
        resultEl.innerHTML = '<span style="color:var(--text-dim)">测试中...</span>';
        btnLoading(btn, '测试中...');
        fetch('/api/test-ai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                api_url: document.getElementById('tc-api-url').value.trim(),
                api_key: document.getElementById('tc-api-key').value.trim(),
                model: document.getElementById('tc-model').value.trim()
            })
        }).then(function(r) { return r.json(); }).then(function(data) {
            btnReset(btn);
            if (data.ok) {
                resultEl.innerHTML = '<span style="color:var(--success)">✓ 连接成功</span> <span style="color:var(--text-dim)">模型: ' + esc(data.model || '') + ' 回复: ' + esc(data.reply || '') + '</span>';
            } else {
                resultEl.innerHTML = '<span style="color:var(--danger)">✗ 连接失败</span> <span style="color:var(--text-dim)">' + esc(data.error || '未知错误') + '</span>';
            }
        }).catch(function(err) {
            btnReset(btn);
            resultEl.innerHTML = '<span style="color:var(--danger)">✗ 请求失败: ' + esc(err.message) + '</span>';
        });
    }

    function renderPathMappings(prefix, mappings) {
        var html = '<div class="form-row" style="flex-direction:column;align-items:flex-start;gap:6px">';
        html += '<span class="form-label">路径映射</span>';
        html += '<div id="cfg-pm-' + prefix + '" style="width:100%">';
        mappings.forEach(function(m, i) {
            html += '<div class="pm-row" style="display:flex;gap:6px;margin-bottom:4px;align-items:center">';
            html += '<input class="form-input" data-pm-from="' + prefix + '" value="' + esc(m.from || '') + '" placeholder="远端路径 (如 /tv)" style="flex:1">';
            html += '<span style="color:var(--text-dim)">→</span>';
            html += '<input class="form-input" data-pm-to="' + prefix + '" value="' + esc(m.to || '') + '" placeholder="本地路径 (如 /mnt/tv)" style="flex:1">';
            html += '<span style="cursor:pointer;color:var(--danger);font-size:1.1rem" onclick="this.parentElement.remove()" title="删除">✕</span>';
            html += '</div>';
        });
        html += '</div>';
        html += '<button class="btn btn-outline btn-sm" onclick="addPathMapping(\'' + prefix + '\')" style="margin-top:2px">+ 添加映射</button>';
        html += '</div>';
        return html;
    }

    function addPathMapping(prefix) {
        var container = document.getElementById('cfg-pm-' + prefix);
        var div = document.createElement('div');
        div.className = 'pm-row';
        div.style.cssText = 'display:flex;gap:6px;margin-bottom:4px;align-items:center';
        div.innerHTML = '<input class="form-input" data-pm-from="' + prefix + '" value="" placeholder="远端路径 (如 /tv)" style="flex:1">'
            + '<span style="color:var(--text-dim)">→</span>'
            + '<input class="form-input" data-pm-to="' + prefix + '" value="" placeholder="本地路径 (如 /mnt/tv)" style="flex:1">'
            + '<span style="cursor:pointer;color:var(--danger);font-size:1.1rem" onclick="this.parentElement.remove()" title="删除">✕</span>';
        container.appendChild(div);
    }

    function testConnection(service) {
        fetch('/api/test-connection', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({service: service})
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.ok) {
                toast(service + ' 连接成功' + (data.version ? ' (' + data.version + ')' : ''), 'success');
            } else {
                toast(service + ' 连接失败: ' + data.error, 'error');
            }
        }).catch(function(err) { toast(service + ' 请求失败: ' + err.message, 'error'); });
    }

    function toggleConcurrentSearch() {
        var isOn = document.getElementById('cfg-concurrent').checked;
        var hint = document.getElementById('concurrent-hint');
        hint.style.display = isOn ? 'none' : 'flex';
        ['zimuku','subhd','assrt','opensubtitles'].forEach(function(p) {
            var cb = document.getElementById('cfg-prov-' + p);
            if (cb) {
                cb.disabled = !isOn;
                cb.parentElement.style.opacity = isOn ? '1' : '0.4';
                cb.parentElement.style.cursor = isOn ? 'pointer' : 'not-allowed';
            }
        });
    }

    function toggleDetail(el) {
        var target = document.getElementById(el.getAttribute('data-target'));
        if (target) {
            var showing = target.style.display !== 'none';
            target.style.display = showing ? 'none' : '';
            var arrow = showing ? '▸' : '▾';
            if (el.textContent.charAt(0) === '▸' || el.textContent.charAt(0) === '▾') {
                el.textContent = arrow + el.textContent.substring(1);
            } else {
                el.textContent = arrow;
            }
            el.style.opacity = showing ? '0.6' : '1';
        }
    }

    function saveConfig() {
        var enabledProvs = [];
        ['zimuku','subhd','assrt','opensubtitles'].forEach(function(p) {
            var el = document.getElementById('cfg-prov-' + p);
            if (el && el.checked) enabledProvs.push(p);
        });
        function collectPathMappings(prefix) {
            var container = document.getElementById('cfg-pm-' + prefix);
            if (!container) return [];
            var rows = container.querySelectorAll('div');
            var result = [];
            rows.forEach(function(row) {
                var inputs = row.querySelectorAll('input');
                if (inputs.length >= 2) {
                    var from = inputs[0].value.trim();
                    var to = inputs[1].value.trim();
                    if (from && to) result.push({from: from, to: to});
                }
            });
            return result;
        }

        var data = {
            video_root: document.getElementById('cfg-video-root').value.trim(),
            auto_download: document.getElementById('cfg-auto-dl').checked,
            auto_download_lang: document.getElementById('cfg-auto-lang').value,
            radarr_url: document.getElementById('cfg-radarr-url').value.trim(),
            radarr_api_key: document.getElementById('cfg-radarr-key').value.trim(),
            radarr_path_mappings: collectPathMappings('radarr'),
            sonarr_url: document.getElementById('cfg-sonarr-url').value.trim(),
            sonarr_api_key: document.getElementById('cfg-sonarr-key').value.trim(),
            sonarr_path_mappings: collectPathMappings('sonarr'),
            enabled_providers: enabledProvs,
            subtitle_provider: document.getElementById('cfg-default-prov').value,
            concurrent_search: document.getElementById('cfg-concurrent').checked,
            max_download_count: parseInt(document.getElementById('cfg-max-dl').value) || 1,
            score_threshold_pct: parseFloat(document.getElementById('cfg-score-pct').value) || 10,
            good_score_threshold: parseFloat(document.getElementById('cfg-good-score').value) || 72,
            chinese_score_english_fallback: parseFloat(document.getElementById('cfg-chs-en-fallback').value) || 72,
            chinese_scarce_count: parseInt(document.getElementById('cfg-chs-scarce-count').value) || 1,
            chinese_scarce_buffer: parseFloat(document.getElementById('cfg-chs-scarce-buffer').value) || 15,
            min_score_pct: parseFloat(document.getElementById('cfg-min-score-pct').value) || 5,
            queue_max_size: parseInt(document.getElementById('cfg-queue-max').value) || 100,
            baidu_ocr_api_key: document.getElementById('cfg-baidu-key').value.trim(),
            baidu_ocr_secret_key: document.getElementById('cfg-baidu-secret').value.trim(),
            assrt_api_token: document.getElementById('cfg-assrt-token').value.trim(),
            opensubtitles_api_key: document.getElementById('cfg-os-api-key').value.trim(),
            opensubtitles_username: document.getElementById('cfg-os-user').value.trim(),
            opensubtitles_password: document.getElementById('cfg-os-pass').value
        };
        fetch('/api/settings', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(function(r) { return r.json(); }).then(function(res) {
            Object.assign(_config, data);
            toast('配置已保存', 'success');
        }).catch(function(err) {
            toast('保存失败: ' + err.message, 'error');
        });
    }
    var _confirmCb = null;
    function showConfirm(msg, onYes) {
        document.getElementById('confirmMsg').textContent = msg;
        document.getElementById('confirmModal').classList.add('show');
        _confirmCb = onYes;
    }
    document.getElementById('confirmYes').onclick = function() {
        document.getElementById('confirmModal').classList.remove('show');
        if (_confirmCb) _confirmCb();
        _confirmCb = null;
    };
    document.getElementById('confirmNo').onclick = function() {
        document.getElementById('confirmModal').classList.remove('show');
        _confirmCb = null;
    };

    function setupInfoTips() {
        document.querySelectorAll('.info-tip').forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                this.classList.toggle('active');
            });
        });
    }
